<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BomberTime - Écran Principal</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #2b1d14; color: #f5e6d3; text-align: center; margin: 0; overflow: hidden; }
        #lobby-screen { padding: 20px; overflow-y: auto; height: 100vh; box-sizing: border-box; }
        h1 { color: #f9a826; font-size: 3em; margin-bottom: 10px; }
        .instructions { font-size: 1.2em; color: #ffb4a2; }
        #roomCode { font-size: 5em; letter-spacing: 15px; font-weight: bold; color: #ff6b6b; margin: 20px 0; }
        .players-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; }
        .team-card { background: #5c3a21; padding: 20px; border-radius: 15px; border: 3px solid #f9a826; min-width: 200px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .team-card h3 { margin-top: 0; color: #f9a826; }
        .team-card p { font-size: 1.1em; margin: 5px 0; }
        .player-badge { display: inline-block; background-color: #ffb4a2; color: #2b1d14; border-radius: 50%; width: 25px; height: 25px; line-height: 25px; font-weight: bold; margin-left: 10px; }
        #playersList { margin-bottom: 20px; }
        canvas { image-rendering: pixelated; }
    </style>
</head>
<body>
    <h1>BomberTime</h1>
    <div id="lobby-screen">
        <p class="instructions">Scannez ce QR Code ou allez sur <strong><span id="urlText"></span>/mobile.html</strong> pour rejoindre :</p>
        <div id="qrcode" style="margin: 20px auto; padding: 10px; background: #f5e6d3; display: inline-block; border-radius: 10px; border: 3px solid #f9a826;"></div>
        <div id="roomCode">CHARGEMENT...</div>
        <h3>Joueurs connectés : <span id="playerCount">0</span></h3>
        <button id="btnStart" style="display:none; font-size: 1.5em; background: #f9a826; color: #2b1d14; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px;">Lancer la partie</button>
        <div class="players-container" id="playersList"></div>
    </div>

    <!-- Canvas pour le rendu du jeu -->
    <canvas id="gameCanvas" style="display:none; position: absolute; top: 0; left: 0;"></canvas>
    
    <!-- Écran de Game Over Overlay -->
    <div id="gameover-screen" style="display:none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; flex-direction: column;">
        <h2 id="winnerText" style="color: #f9a826; font-size: 2.5em; margin-bottom: 20px;"></h2>
        <button id="btnRestart" style="font-size: 1.5em; background: #ff6b6b; color: white; padding: 15px 30px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold;">Relancer la partie</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        const socket = io();
        let currentRoom = null;

        // Afficher l'URL brute au cas où
        document.getElementById('urlText').innerText = window.location.host;

        socket.on('connect', () => {
            socket.emit('createLobby');
        });

        socket.on('lobbyCreated', (data) => {
            currentRoom = data.roomCode;
            document.getElementById('roomCode').innerText = currentRoom;
            
            // Génération du QR Code
            const joinUrl = window.location.origin + '/mobile.html?room=' + currentRoom;
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), {
                text: joinUrl,
                width: 150,
                height: 150,
                colorDark : "#2b1d14",
                colorLight : "#f5e6d3",
                correctLevel : QRCode.CorrectLevel.M
            });
        });

        socket.on('playerJoined', (data) => {
            document.getElementById('playerCount').innerText = data.players.length;
            const playersList = document.getElementById('playersList');
            playersList.innerHTML = '';
            
            // Regrouper par équipes
            const teams = {};
            data.players.forEach(p => {
                if (!teams[p.team]) teams[p.team] = [];
                teams[p.team].push(p);
            });

            for (const teamId in teams) {
                const teamDiv = document.createElement('div');
                teamDiv.className = 'team-card';
                teamDiv.innerHTML = `<h3>Équipe ${teamId}</h3>`;
                teams[teamId].forEach(p => {
                    teamDiv.innerHTML += `<p>${p.name} <span class="player-badge">${p.playerNumber}</span></p>`;
                });
                playersList.appendChild(teamDiv);
            }
            
            // Afficher le bouton start s'il y a au moins 1 joueur
            if (data.players.length > 0) {
                document.getElementById('btnStart').style.display = 'inline-block';
            }
        });

        document.getElementById('btnStart').addEventListener('click', () => {
            if (currentRoom) {
                socket.emit('startGame', currentRoom);
            }
        });

        // --- Logique du Canvas (Le Rendu) ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let TILE_SIZE = 30;
        let offsetX = 0;
        let offsetY = 0;
        let currentState = null;
        
        const tintCanvas = document.createElement('canvas');
        const tintCtx = tintCanvas.getContext('2d');
        
        const teamColors = {
            1: 'rgba(255, 0, 0, 0.4)',
            2: 'rgba(0, 0, 255, 0.4)',
            3: 'rgba(0, 255, 0, 0.4)',
            4: 'rgba(255, 255, 0, 0.4)',
            5: 'rgba(255, 165, 0, 0.4)',
            6: 'rgba(128, 0, 128, 0.4)',
            7: 'rgba(0, 255, 255, 0.4)',
            8: 'rgba(255, 192, 203, 0.4)'
        };

        function resizeCanvas(gridWidth, gridHeight) {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            
            // Désactiver le lissage pour les assets pixel-art
            ctx.imageSmoothingEnabled = false;
            
            if (gridWidth && gridHeight) {
                const maxTileW = canvas.width / gridWidth;
                const maxTileH = canvas.height / gridHeight;
                TILE_SIZE = Math.floor(Math.min(maxTileW, maxTileH));
                
                offsetX = Math.floor((canvas.width - (TILE_SIZE * gridWidth)) / 2);
                offsetY = Math.floor((canvas.height - (TILE_SIZE * gridHeight)) / 2);
            }
        }

        window.addEventListener('resize', () => {
            if (currentState && currentState.width) {
                resizeCanvas(currentState.width, currentState.height);
                drawGame(currentState);
            }
        });

        // Préchargement des assets graphiques
        const assets = {
            bomb: new Image(),
            fond1: new Image(),
            fond2: new Image(),
            mur: new Image(),
            bouclier: new Image(),
            donuts1: new Image(),
            donuts2: new Image(),
            donuts3: new Image(),
            destruction: [],
            perso: { bottom: [], top: [], left: [], right: [], death: [] }
        };
        assets.bomb.src = '/asset/bombe.png';
        assets.fond1.src = '/asset/fond1.png';
        assets.fond2.src = '/asset/fond2.png';
        assets.mur.src = '/asset/mur-indestructible.png';
        assets.bouclier.src = '/asset/bouclier.png';
        assets.donuts1.src = '/asset/donuts1.png';
        assets.donuts2.src = '/asset/donuts2.png';
        assets.donuts3.src = '/asset/donuts3.png';
        
        for (let i = 0; i <= 5; i++) {
            const img = new Image();
            img.src = `/asset/destruction/destruction_${i}.png`;
            assets.destruction.push(img);
        }
        
        ['bottom', 'top', 'left', 'right'].forEach(dir => {
            for (let i = 1; i <= 3; i++) {
                const img = new Image();
                img.src = `/asset/perso/${dir}${i}.png`;
                assets.perso[dir].push(img);
            }
        });
        
        for (let i = 1; i <= 7; i++) {
            const img = new Image();
            img.src = `/asset/perso/death${i}.png`;
            assets.perso.death.push(img);
        }

        socket.on('gameStarted', () => {
            document.getElementById('lobby-screen').style.display = 'none';
            document.getElementById('gameover-screen').style.display = 'none';
            canvas.style.display = 'block';
        });

        document.getElementById('btnRestart').addEventListener('click', () => {
            if (currentRoom) {
                socket.emit('returnToLobby', currentRoom);
            }
        });

        socket.on('resetLobby', () => {
            document.getElementById('gameover-screen').style.display = 'none';
            canvas.style.display = 'none';
            document.getElementById('lobby-screen').style.display = 'block';
        });

        socket.on('gameState', (state) => {
            currentState = state;
            if (state.status === 'gameover') {
                document.getElementById('gameover-screen').style.display = 'flex';
                document.getElementById('winnerText').innerText = state.winner || "Fin de la partie";
            } else {
                document.getElementById('gameover-screen').style.display = 'none';
            }

            if (state.width) {
                if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
                    resizeCanvas(state.width, state.height);
                } else if (TILE_SIZE === 30 && state.width !== 31) {
                    resizeCanvas(state.width, state.height);
                }
            }

            drawGame(state);
        });

        const entityAnims = {};

        function updateEntityAnim(teamId, entity) {
            if (!entityAnims[teamId]) {
                entityAnims[teamId] = { frameIndex: 0, lastTime: Date.now(), deathStartTime: 0 };
            }
            const anim = entityAnims[teamId];
            const now = Date.now();
            
            if (entity.dead) {
                if (!anim.deathStartTime) anim.deathStartTime = now;
                const elapsed = now - anim.deathStartTime;
                const deathFrame = Math.min(Math.floor(elapsed / 100), 6); // 100ms per frame, 7 frames total (0-6)
                return deathFrame;
            }

            // L'animation tourne en boucle tout le temps
            if (now - anim.lastTime > 150) {
                anim.frameIndex = (anim.frameIndex + 1) % 3;
                anim.lastTime = now;
            }
            
            return anim.frameIndex;
        }

        function drawGame(state) {
            // Effacer le canvas complet
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Dessiner un fond de secours pour la zone de jeu
            ctx.fillStyle = '#e3c498';
            ctx.fillRect(offsetX, offsetY, state.width * TILE_SIZE, state.height * TILE_SIZE);

            // Dessiner la grille (la map)
            const grid = state.grid;
            for (let y = 0; y < grid.length; y++) {
                for (let x = 0; x < grid[y].length; x++) {
                    const px = offsetX + x * TILE_SIZE;
                    const py = offsetY + y * TILE_SIZE;

                    // Dessiner le fond (terre) en damier
                    const isFond1 = ((x + y) % 2 === 0);
                    const fondImg = isFond1 ? assets.fond1 : assets.fond2;
                    if (fondImg.complete) {
                        ctx.drawImage(fondImg, px, py, TILE_SIZE, TILE_SIZE);
                    }

                    if (grid[y][x] === 1) { // Mur indestructible
                        if (assets.mur.complete) {
                            ctx.drawImage(assets.mur, px, py, TILE_SIZE, TILE_SIZE);
                        } else {
                            ctx.fillStyle = '#4a2f1d';
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        }
                    } else if (grid[y][x] === 2) { // Mur destructible (brique)
                        if (assets.destruction[0].complete) {
                            ctx.drawImage(assets.destruction[0], px, py, TILE_SIZE, TILE_SIZE);
                        } else {
                            ctx.fillStyle = '#d2b48c'; // Beige biscuit
                            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
                        }
                    }
                }
            }
            
            // Dessiner l'animation de destruction des blocs
            if (state.destroyingBlocks) {
                const now = Date.now();
                state.destroyingBlocks.forEach(block => {
                    const elapsed = now - block.time;
                    const frameIndex = Math.floor((elapsed / 500) * 6); // 6 frames de destruction
                    if (frameIndex >= 0 && frameIndex <= 5) {
                        const img = assets.destruction[frameIndex];
                        if (img.complete) {
                            ctx.drawImage(img, offsetX + block.x * TILE_SIZE, offsetY + block.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                        }
                    }
                });
            }

            // Dessiner les bombes (gâteaux)
            state.bombs.forEach(b => {
                if (assets.bomb.complete) {
                    ctx.drawImage(assets.bomb, offsetX + b.x * TILE_SIZE + 2, offsetY + b.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                } else {
                    ctx.fillStyle = '#ffb4a2'; // Rose gâteau
                    ctx.fillRect(offsetX + b.x * TILE_SIZE + 4, offsetY + b.y * TILE_SIZE + 4, TILE_SIZE - 8, TILE_SIZE - 8);
                }
            });

            // Dessiner les items
            state.items.forEach(i => {
                if (i.type === 'shield' && assets.bouclier.complete) {
                    ctx.drawImage(assets.bouclier, offsetX + i.x * TILE_SIZE + 2, offsetY + i.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                } else if (i.type.startsWith('donuts') && assets[i.type] && assets[i.type].complete) {
                    ctx.drawImage(assets[i.type], offsetX + i.x * TILE_SIZE + 2, offsetY + i.y * TILE_SIZE + 2, TILE_SIZE - 4, TILE_SIZE - 4);
                } else {
                    if (i.type === 'shield') {
                        ctx.fillStyle = '#4ecdc4'; // Bouclier (cyan)
                    } else if (i.type.startsWith('donuts')) {
                        ctx.fillStyle = i.type === 'donuts1' ? '#ff69b4' : (i.type === 'donuts2' ? '#00bfff' : '#ffd700'); // Fallbacks
                    } else if (i.type === 'portal') {
                        ctx.fillStyle = '#9b59b6'; // Portail (violet)
                    }
                    ctx.beginPath();
                    ctx.arc(offsetX + i.x * TILE_SIZE + TILE_SIZE/2, offsetY + i.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/3, 0, Math.PI*2);
                    ctx.fill();
                    
                    if (i.type.startsWith('donuts')) {
                        ctx.fillStyle = '#e3c498'; // Trou du donut
                        ctx.beginPath();
                        ctx.arc(offsetX + i.x * TILE_SIZE + TILE_SIZE/2, offsetY + i.y * TILE_SIZE + TILE_SIZE/2, TILE_SIZE/6, 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            });

            // Dessiner les explosions
            state.explosions.forEach(exp => {
                ctx.fillStyle = 'rgba(216, 27, 96, 0.7)'; // Rouge/Rose explosion
                exp.cells.forEach(cell => {
                    ctx.fillRect(offsetX + cell.x * TILE_SIZE, offsetY + cell.y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                });
            });
            
            // Dessiner les entités (les P'tits Biscuits des équipes)
            for (const teamId in state.entities) {
                const entity = state.entities[teamId];
                const frameIndex = updateEntityAnim(teamId, entity);
                
                let imgToDraw = null;
                if (entity.dead) {
                    imgToDraw = assets.perso.death[frameIndex];
                } else {
                    const dir = entity.direction || 'bottom';
                    imgToDraw = assets.perso[dir][frameIndex];
                }

                const px = offsetX + entity.x * TILE_SIZE;
                const py = offsetY + entity.y * TILE_SIZE;

                if (imgToDraw && imgToDraw.complete) {
                    if (entity.dead) {
                        ctx.drawImage(imgToDraw, px, py, TILE_SIZE, TILE_SIZE);
                    } else {
                        // Coloration de l'équipe sur un canvas temporaire
                        tintCanvas.width = TILE_SIZE;
                        tintCanvas.height = TILE_SIZE;
                        tintCtx.imageSmoothingEnabled = false;
                        tintCtx.clearRect(0, 0, TILE_SIZE, TILE_SIZE);
                        
                        tintCtx.drawImage(imgToDraw, 0, 0, TILE_SIZE, TILE_SIZE);
                        
                        // Appliquer la teinte
                        tintCtx.globalCompositeOperation = 'source-atop';
                        tintCtx.fillStyle = teamColors[teamId] || 'rgba(255,255,255,0)';
                        tintCtx.fillRect(0, 0, TILE_SIZE, TILE_SIZE);
                        
                        // Réinitialiser le mode
                        tintCtx.globalCompositeOperation = 'source-over';
                        
                        ctx.drawImage(tintCanvas, px, py, TILE_SIZE, TILE_SIZE);
                    }
                } else if (entity.dead) {
                    // Fallback croix si pas d'image
                    ctx.strokeStyle = '#5c3a21';
                    ctx.lineWidth = 4;
                    ctx.beginPath();
                    ctx.moveTo(px + 5, py + 5);
                    ctx.lineTo(px + TILE_SIZE - 5, py + TILE_SIZE - 5);
                    ctx.moveTo(px + TILE_SIZE - 5, py + 5);
                    ctx.lineTo(px + 5, py + TILE_SIZE - 5);
                    ctx.stroke();
                } else {
                    // Fallback cercle rouge
                    ctx.fillStyle = '#ff6b6b'; 
                    ctx.beginPath();
                    ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE/2.5, 0, Math.PI*2);
                    ctx.fill();
                }
                
                // Halo si Shield actif
                if (!entity.dead && entity.hasShield) {
                    ctx.strokeStyle = '#4ecdc4';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE/2, 0, Math.PI*2);
                    ctx.stroke();
                }
                
                // Dessiner le nom de l'équipe
                if (!entity.dead) {
                    ctx.fillStyle = 'white';
                    ctx.font = 'bold 12px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    let displayName = entity.name || teamId;
                    if (displayName.length > 10) displayName = displayName.substring(0, 10) + '...';
                    ctx.fillText(displayName, px + TILE_SIZE/2, py - 5);
                }
            }

            // --- Phase de démarrage ---
            if (state.status === 'starting') {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                
                ctx.fillStyle = 'white';
                ctx.font = 'bold 100px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(state.countdown, canvas.width/2, canvas.height/2);
                
                ctx.font = 'bold 30px Arial';
                ctx.fillText("Repérez votre personnage !", canvas.width/2, canvas.height/2 + 80);

                const pulse = (Date.now() % 1000) / 1000;
                ctx.strokeStyle = `rgba(255, 255, 255, ${1 - pulse})`;
                ctx.lineWidth = 4;
                for (const teamId in state.entities) {
                    const entity = state.entities[teamId];
                    if (!entity.dead) {
                        const px = offsetX + entity.x * TILE_SIZE;
                        const py = offsetY + entity.y * TILE_SIZE;
                        ctx.beginPath();
                        ctx.arc(px + TILE_SIZE/2, py + TILE_SIZE/2, TILE_SIZE * 2 * pulse, 0, Math.PI*2);
                        ctx.stroke();
                    }
                }
            }
        }
    </script>
</body>
</html>
